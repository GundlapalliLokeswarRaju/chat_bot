<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Brolly – AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --accent-glow: rgba(108,99,255,0.18);
      --text: #f0f0f5;
      --muted: #8b8fa8;
      --success: #22c55e;
      --teal: #2dd4bf;
      --coral: #f87171;
      --amber: #fbbf24;
      --green: #4ade80;
      --font-main: 'Sora', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 14px;
      --radius-sm: 8px;
      --radius-pill: 999px;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(45,212,191,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .chat-shell {
      width: 100%;
      max-width: 740px;
      height: 100vh;
      max-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-left: 0.5px solid var(--border2);
      border-right: 0.5px solid var(--border2);
      position: relative;
    }

    /* ── Header ── */
    .chat-header {
      padding: 16px 20px;
      border-bottom: 0.5px solid var(--border2);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .bot-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #2dd4bf);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .bot-avatar svg { width: 20px; height: 20px; }
    .header-info h2 {
      font-family: var(--font-main);
      font-size: 15px; font-weight: 600;
      color: var(--text);
    }
    .header-info .status-row {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--muted); margin-top: 1px;
    }
    .online-dot {
      width: 7px; height: 7px;
      border-radius: 50%; background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .header-badge {
      margin-left: auto;
      font-size: 11px; font-weight: 500;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      background: var(--accent-glow);
      color: var(--accent2);
      border: 0.5px solid rgba(108,99,255,0.3);
    }

    /* ── Messages area ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── Message rows ── */
    .msg-row { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.3s ease; }
    .msg-row.user { flex-direction: row-reverse; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .av {
      width: 32px; height: 32px;
      border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; font-family: var(--font-main);
    }
    .av.bot { background: linear-gradient(135deg, #6c63ff, #2dd4bf); }
    .av.user { background: var(--surface2); color: var(--muted); border: 0.5px solid var(--border2); }

    .user-bubble {
      background: linear-gradient(135deg, #6c63ff, #7c3aed);
      color: #fff;
      padding: 10px 16px;
      border-radius: 18px 18px 4px 18px;
      font-size: 14px; line-height: 1.55;
      max-width: 70%;
    }

    .bot-response { max-width: 92%; display: flex; flex-direction: column; gap: 10px; }

    .resp-intro {
      font-size: 14px; color: var(--muted);
      line-height: 1.6;
    }

    /* ── Section cards ── */
    .s-card {
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .s-head {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px;
      border-bottom: 0.5px solid var(--border);
    }
    .s-icon {
      width: 24px; height: 24px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .s-title {
      font-family: var(--font-main);
      font-size: 13px; font-weight: 500;
      color: var(--text);
    }
    .s-badge {
      margin-left: auto;
      font-size: 11px; font-weight: 500;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
    }
    .badge-purple { background: rgba(108,99,255,0.15); color: var(--accent2); }
    .badge-green  { background: rgba(34,197,94,0.12);  color: #4ade80; }
    .badge-teal   { background: rgba(45,212,191,0.12); color: var(--teal); }

    .s-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 7px; }

    .feat-row {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 13px; color: #cccde0; line-height: 1.55;
    }
    .feat-dot {
      width: 5px; height: 5px;
      border-radius: 50%; background: var(--accent2);
      flex-shrink: 0; margin-top: 8px;
    }

    /* Stats strip */
    .stats-strip {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border);
    }
    .stat-cell {
      background: var(--surface2);
      padding: 12px 10px; text-align: center;
    }
    .stat-val {
      font-family: var(--font-main);
      font-size: 18px; font-weight: 600;
      color: var(--text);
    }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Tag cloud */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
    .tag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      border: 0.5px solid var(--border2);
      color: var(--muted);
      background: rgba(255,255,255,0.03);
    }

    /* Trainer card */
    .trainer-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
    }
    .trainer-av {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #2dd4bf);
      color: #fff;
      font-family: var(--font-main);
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .trainer-info p { font-size: 14px; font-weight: 500; color: var(--text); }
    .trainer-info span { font-size: 12px; color: var(--muted); }

    /* Placement list */
    .placement-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
    .pl-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: #cccde0;
    }
    .pl-icon {
      width: 24px; height: 24px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
    }

    /* ── Input area ── */
    .chat-input-area {
      padding: 12px 16px;
      border-top: 0.5px solid var(--border2);
      display: flex; gap: 10px; align-items: center;
      background: var(--surface);
      flex-shrink: 0;
    }
    .chat-input-area input {
      flex: 1;
      padding: 11px 16px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-family: var(--font-body);
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input-area input::placeholder { color: var(--muted); }
    .chat-input-area input:focus { border-color: rgba(108,99,255,0.5); }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #7c3aed);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }
    .send-btn:hover { transform: scale(1.06); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 16px; height: 16px; }

    /* Loading dots */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 0; }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.9); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Error bubble */
    .err-bubble {
      font-size: 13px; color: var(--coral);
      padding: 10px 14px;
      background: rgba(248,113,113,0.08);
      border: 0.5px solid rgba(248,113,113,0.2);
      border-radius: var(--radius-sm);
    }

    /* Contact strip */
    .contact-strip {
      display: flex; flex-direction: column; gap: 6px;
      padding: 10px 14px;
    }
    .contact-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted);
    }
    .contact-row strong { color: var(--text); }

    /* CTA buttons */
    .cta-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      border-radius: 10px;
      font-size: 13px; font-weight: 500;
      font-family: var(--font-main);
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      cursor: pointer;
    }
    .cta-btn:hover { opacity: 0.85; transform: scale(1.01); }
    .cta-btn:active { transform: scale(0.98); }
    .cta-call {
      background: rgba(108,99,255,0.12);
      color: #a78bfa;
      border: 0.5px solid rgba(108,99,255,0.25);
    }
    .cta-wa {
      background: rgba(37,211,102,0.12);
      color: #25d366;
      border: 0.5px solid rgba(37,211,102,0.25);
    }
  </style>
</head>
<body>
<div class="chat-shell">

  <!-- Header -->
  <div class="chat-header">
    <div class="bot-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8">
        <rect x="3" y="11" width="18" height="10" rx="2"/>
        <path d="M12 11V7"/><circle cx="12" cy="5" r="2"/>
        <path d="M8 15h0M16 15h0"/>
      </svg>
    </div>
    <div class="header-info">
      <h2>Digital Brolly Assistant</h2>
      <div class="status-row"><span class="online-dot"></span> Online · Ready to help</div>
    </div>
    <div class="header-badge">RAG Powered</div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="messages">
    <!-- Welcome message -->
    <div class="msg-row">
      <div class="av bot">
        <svg viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="1.6" width="14" height="14">
          <rect x="2" y="8" width="16" height="9" rx="2"/><path d="M10 8V5"/><circle cx="10" cy="3.5" r="1.5"/>
        </svg>
      </div>
      <div class="bot-response">
        <div class="resp-intro">Hi! I'm your Digital Brolly assistant. Ask me anything about our digital marketing course — fees, schedule, tools, placement support, and more.</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Ask about fees, schedule, admissions…" autocomplete="off" />
    <button class="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<script>
  const API_URL = 'https://loudish-meredith-unpunctured.ngrok-free.dev/chat';
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('chat-input');

  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // ── Section icon configs ──
  const SECTION_ICONS = {
    'course':    { bg: 'rgba(108,99,255,0.18)', stroke: '#a78bfa', path: '<path d="M12 2H4a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="12 2 12 8 18 8"/>' },
    'training':  { bg: 'rgba(45,212,191,0.15)', stroke: '#2dd4bf', path: '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>' },
    'trainer':   { bg: 'rgba(251,191,36,0.15)', stroke: '#fbbf24', path: '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>' },
    'placement': { bg: 'rgba(74,222,128,0.15)', stroke: '#4ade80', path: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>' },
    'unique':    { bg: 'rgba(248,113,113,0.15)', stroke: '#f87171', path: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' },
    'tools':     { bg: 'rgba(108,99,255,0.15)', stroke: '#a78bfa', path: '<path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>' },
    'default':   { bg: 'rgba(108,99,255,0.15)', stroke: '#a78bfa', path: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>' },
  };

  function iconFor(title) {
    const t = title.toLowerCase();
    if (t.includes('course') || t.includes('content') || t.includes('module')) return SECTION_ICONS.course;
    if (t.includes('train') && t.includes('approach')) return SECTION_ICONS.training;
    if (t.includes('trainer') || t.includes('expert')) return SECTION_ICONS.trainer;
    if (t.includes('placement') || t.includes('career')) return SECTION_ICONS.placement;
    if (t.includes('unique') || t.includes('feature')) return SECTION_ICONS.unique;
    if (t.includes('tool')) return SECTION_ICONS.tools;
    return SECTION_ICONS.default;
  }

  function svgIcon(cfg) {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${cfg.stroke}" stroke-width="1.8" width="13" height="13">${cfg.path}</svg>`;
  }

  // ── Clean markdown bold/italic from text ──
  function cleanMd(text) {
    return text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').trim();
  }
  function stripMd(text) {
    return text.replace(/\*\*([^*]+)\*\*/g, '$1').trim();
  }

  // ── Split body text into bullet array ──
  function splitBullets(body) {
    // Split on: "• item", "- item", or ". item" after bold keyword
    return body
      .split(/[•\n]\s*|\.\s+(?=[A-Z])/)
      .map(s => stripMd(s).trim())
      .filter(s => s.length > 4);
  }

  // ── Detect response format and parse into sections ──
  function parseSections(rawText) {
    const text = rawText.trim();

    // ── FORMAT A: "1. **Title:** ..." numbered sections ──
    const fmtA = /(\d+)\.\s+\*\*([^*]+)\*\*[:\s\u2014-]*([\s\S]*?)(?=\d+\.\s+\*\*|$)/g;
    const sectionsA = [];
    let m;
    while ((m = fmtA.exec(text)) !== null) {
      const title = m[2].replace(/:$/, '').trim();
      const body  = m[3].trim();
      const bullets = body.split(/\n?\s*[-•]\s+/).filter(b => b.trim().length > 3).map(b => stripMd(b));
      if (bullets.length === 0 && body.length > 3) bullets.push(stripMd(body));
      sectionsA.push({ title, bullets });
    }
    if (sectionsA.length >= 2) return { format: 'sections', sections: sectionsA };

    // ── FORMAT B: "Direct Answer — ..." / "Details — ..." / "Source Hint — ..." ──
    // Also handles: "1. Direct Answer — ..." style
    const fmtB = /(?:\d+\.\s+)?([A-Za-z ]+?)\s*[—\-–:]\s*([\s\S]*?)(?=(?:\d+\.\s+)?[A-Za-z ]+?\s*[—\-–:]|$)/g;
    const sectionsB = [];
    const knownLabels = ['direct answer', 'details', 'source hint', 'summary', 'answer', 'explanation', 'note'];
    while ((m = fmtB.exec(text)) !== null) {
      const label = m[1].trim();
      const body  = m[2].trim();
      if (!label || body.length < 3) continue;
      const isKnown = knownLabels.some(k => label.toLowerCase().includes(k));
      if (isKnown || label.length < 30) {
        const bullets = splitBullets(body);
        sectionsB.push({ title: label, bullets, raw: body });
      }
    }
    // Remove noise sections like bare "Call" / "WhatsApp" (contact info handled separately)
    const noiseLabels = ['call', 'whatsapp', 'phone', 'contact'];
    const filteredB = sectionsB.filter(s => !noiseLabels.some(n => s.title.toLowerCase().trim() === n));
    if (filteredB.length >= 1) return { format: 'qa', sections: filteredB };

    // ── FORMAT C: Plain text fallback ──
    return { format: 'plain', text };
  }

  // ── Detect known keywords in text for special rendering ──
  function extractStats(bullets) {
    // Look for numbers: 35+ modules, 600+ topics, 50+ tools
    const statsFound = [];
    const patterns = [
      { re: /(\d+\+?\s*modules?)/i,  label: 'Modules' },
      { re: /(\d+\+?\s*topics?)/i,   label: 'Topics' },
      { re: /(\d+\+?\s*tools?)/i,    label: 'Tools' },
      { re: /(\d+\s*days?)/i,        label: 'Days access' },
      { re: /(\d+\+?\s*years?)/i,    label: 'Experience' },
    ];
    for (const p of patterns) {
      for (const b of bullets) {
        const m = b.match(p.re);
        if (m && statsFound.length < 3) {
          statsFound.push({ val: m[1].trim(), lbl: p.label });
        }
      }
    }
    return statsFound;
  }

  function extractTools(bullets) {
    const tools = [];
    const toolKeywords = ['SEO', 'Google Ads', 'ChatGPT', 'AI tools', 'analytics', 'Canva', 'WordPress', 'Social Media', 'content', 'design tools'];
    for (const b of bullets) {
      for (const kw of toolKeywords) {
        if (b.toLowerCase().includes(kw.toLowerCase()) && !tools.includes(kw)) {
          tools.push(kw);
        }
      }
    }
    return tools.slice(0, 8);
  }

  function extractTrainer(bullets) {
    for (const b of bullets) {
      const m = b.match(/([A-Z][a-z]+ [A-Z][a-z]+)[,\s].*?(\d+\+?\s*years?)/i);
      if (m) return { name: m[1], exp: m[2] };
    }
    return null;
  }

  // ── Build a single section card HTML ──
  function buildSectionCard(section) {
    const icon = iconFor(section.title);
    const tl = section.title.toLowerCase();

    // Placement section
    if (tl.includes('placement') || tl.includes('career')) {
      const items = section.bullets.map(b => `
        <div class="pl-item">
          <div class="pl-icon" style="background:rgba(74,222,128,0.12);">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          ${b}
        </div>`).join('');
      return `
      <div class="s-card">
        <div class="s-head">
          <div class="s-icon" style="background:${icon.bg};">${svgIcon(icon)}</div>
          <span class="s-title">${section.title}</span>
          <span class="s-badge badge-green" style="margin-left:auto;">100% support</span>
        </div>
        <div class="placement-list">${items}</div>
      </div>`;
    }

    // Course / content section — show stats + tags
    if (tl.includes('course') || tl.includes('content') || tl.includes('module')) {
      const stats = extractStats(section.bullets);
      const tools = extractTools(section.bullets);
      const statsHtml = stats.length ? `
        <div class="stats-strip">
          ${stats.map(s => `<div class="stat-cell"><div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('')}
        </div>` : '';
      const tagsHtml = tools.length ? `<div class="tag-cloud">${tools.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : '';
      return `
      <div class="s-card">
        <div class="s-head">
          <div class="s-icon" style="background:${icon.bg};">${svgIcon(icon)}</div>
          <span class="s-title">${section.title}</span>
          <span class="s-badge badge-purple" style="margin-left:auto;">35+ modules</span>
        </div>
        ${statsHtml}${tagsHtml}
      </div>`;
    }

    // Trainer section
    if (tl.includes('trainer') || tl.includes('expert')) {
      const trainer = extractTrainer(section.bullets);
      const trainerHtml = trainer ? `
        <div class="trainer-row">
          <div class="trainer-av">${trainer.name.split(' ').map(w=>w[0]).join('')}</div>
          <div class="trainer-info">
            <p>${trainer.name}</p>
            <span>${trainer.exp} experience · SEO, Google Ads, Social Media, WordPress, Canva</span>
          </div>
        </div>` : `<div class="s-body">${section.bullets.map(b=>`<div class="feat-row"><span class="feat-dot"></span>${b}</div>`).join('')}</div>`;
      return `
      <div class="s-card">
        <div class="s-head">
          <div class="s-icon" style="background:${icon.bg};">${svgIcon(icon)}</div>
          <span class="s-title">${section.title}</span>
        </div>
        ${trainerHtml}
      </div>`;
    }

    // Default section — bullet list
    const bullets = section.bullets.map(b => `<div class="feat-row"><span class="feat-dot"></span>${b}</div>`).join('');
    return `
    <div class="s-card">
      <div class="s-head">
        <div class="s-icon" style="background:${icon.bg};">${svgIcon(icon)}</div>
        <span class="s-title">${section.title}</span>
      </div>
      <div class="s-body">${bullets}</div>
    </div>`;
  }

  // ── Build contact info card ──
  function buildContactCard(contactInfo) {
    if (!contactInfo) return '';
    const phones = (contactInfo.phone_numbers || []).join(', ');
    const wa = contactInfo.whatsapp || '';
    return `
    <div class="s-card" style="margin-top:4px;">
      <div class="s-head">
        <div class="s-icon" style="background:rgba(45,212,191,0.15);">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="1.8">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.16 6.16l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </div>
        <span class="s-title">Contact us</span>
      </div>
      <div class="contact-strip">
        ${phones ? `<div class="contact-row"><strong>Phone:</strong> ${phones}</div>` : ''}
        ${wa    ? `<div class="contact-row"><strong>WhatsApp:</strong> ${wa}</div>` : ''}
      </div>
    </div>`;
  }

  // ── Build QA-format card (Direct Answer / Details / Source Hint) ──
  function buildQACard(section) {
    const tl = section.title.toLowerCase();
    let iconCfg, bg, badge = '';

    if (tl.includes('direct answer') || tl.includes('answer')) {
      iconCfg = { bg: 'rgba(108,99,255,0.18)', stroke: '#a78bfa', path: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>' };
      badge = `<span class="s-badge badge-purple" style="margin-left:auto;">Answer</span>`;
    } else if (tl.includes('detail')) {
      iconCfg = { bg: 'rgba(45,212,191,0.15)', stroke: '#2dd4bf', path: '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>' };
      badge = `<span class="s-badge badge-teal" style="margin-left:auto;">Details</span>`;
    } else if (tl.includes('source')) {
      iconCfg = { bg: 'rgba(251,191,36,0.12)', stroke: '#fbbf24', path: '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>' };
      badge = `<span class="s-badge" style="margin-left:auto;background:rgba(251,191,36,0.12);color:#fbbf24;">Source</span>`;
    } else {
      iconCfg = SECTION_ICONS.default;
    }

    // For "direct answer" render as a highlighted answer box
    if (tl.includes('direct answer') || tl.includes('answer')) {
      const bodyText = section.raw || section.bullets.join(' ');
      // Split on bullet chars
      const lines = bodyText.split(/[•]/).map(s => stripMd(s).trim()).filter(s => s.length > 3);
      const inner = lines.length > 1
        ? lines.map(l => `<div class="feat-row"><span class="feat-dot" style="background:#a78bfa;"></span>${l}</div>`).join('')
        : `<div style="font-size:14px;color:var(--text);line-height:1.65;">${cleanMd(bodyText)}</div>`;
      return `
      <div class="s-card" style="border-color:rgba(108,99,255,0.3);">
        <div class="s-head" style="background:rgba(108,99,255,0.07);">
          <div class="s-icon" style="background:${iconCfg.bg};">${svgIcon(iconCfg)}</div>
          <span class="s-title">Direct answer</span>
          ${badge}
        </div>
        <div class="s-body">${inner}</div>
      </div>`;
    }

    // Details section
    if (tl.includes('detail')) {
      const lines = (section.raw || section.bullets.join('\n')).split(/[-•]/).map(s => stripMd(s).trim()).filter(s => s.length > 4);
      const inner = lines.map(l => `<div class="feat-row"><span class="feat-dot" style="background:#2dd4bf;"></span>${l}</div>`).join('');
      return `
      <div class="s-card">
        <div class="s-head">
          <div class="s-icon" style="background:${iconCfg.bg};">${svgIcon(iconCfg)}</div>
          <span class="s-title">More details</span>
          ${badge}
        </div>
        <div class="s-body">${inner}</div>
      </div>`;
    }

    // Source hint section — small muted footer style
    if (tl.includes('source')) {
      const src = stripMd(section.raw || section.bullets.join(' '));
      return `
      <div style="display:flex;align-items:center;gap:8px;padding:8px 4px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.8">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span style="font-size:12px;color:var(--muted);">${src}</span>
      </div>`;
    }

    // Generic fallback card
    const inner = section.bullets.map(b => `<div class="feat-row"><span class="feat-dot"></span>${b}</div>`).join('');
    return `
    <div class="s-card">
      <div class="s-head">
        <div class="s-icon" style="background:${iconCfg.bg};">${svgIcon(iconCfg)}</div>
        <span class="s-title">${section.title}</span>${badge}
      </div>
      <div class="s-body">${inner}</div>
    </div>`;
  }

  // ── Render full bot message ──
  function renderBotMessage(data) {
    const parsed = parseSections(data.answer);
    let html = '';

    if (parsed.format === 'plain') {
      html = `<div class="resp-intro" style="color:var(--text);font-size:14px;line-height:1.7;">${cleanMd(parsed.text)}</div>`;

    } else if (parsed.format === 'qa') {
      // QA format: Direct Answer / Details / Source Hint
      html += parsed.sections.map(buildQACard).join('');

    } else {
      // Sections format: numbered course info
      html = `<div class="resp-intro">Here's what I found about <strong style="color:var(--text);">Digital Brolly's Digital Marketing program:</strong></div>`;
      html += parsed.sections.map(buildSectionCard).join('');
    }

    if (data.contact_info) html += buildContactCard(data.contact_info);
    html += `<div class="resp-intro" style="font-size:12px;margin-top:4px;">Need more details? Ask me anything!</div>`;

    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <div class="av bot">
        <svg viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="1.6" width="14" height="14">
          <rect x="2" y="8" width="16" height="9" rx="2"/><path d="M10 8V5"/><circle cx="10" cy="3.5" r="1.5"/>
        </svg>
      </div>
      <div class="bot-response">${html}</div>`;
    return row;
  }

  // ── Send message ──
  async function sendMessage() {
    const message = inputEl.value.trim();
    if (!message) return;
    inputEl.value = '';

    // User bubble
    const userRow = document.createElement('div');
    userRow.className = 'msg-row user';
    userRow.innerHTML = `
      <div class="av user">You</div>
      <div class="user-bubble">${message}</div>`;
    messagesEl.appendChild(userRow);

    // Typing indicator
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row';
    typingRow.innerHTML = `
      <div class="av bot">
        <svg viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="1.6" width="14" height="14">
          <rect x="2" y="8" width="16" height="9" rx="2"/><path d="M10 8V5"/><circle cx="10" cy="3.5" r="1.5"/>
        </svg>
      </div>
      <div class="bot-response">
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>`;
    messagesEl.appendChild(typingRow);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      const data = await response.json();
      typingRow.remove();

      const botRow = renderBotMessage(data);
      messagesEl.appendChild(botRow);

    } catch (err) {
      typingRow.remove();
      const errRow = document.createElement('div');
      errRow.className = 'msg-row';
      errRow.innerHTML = `
        <div class="av bot">
          <svg viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="1.6" width="14" height="14">
            <rect x="2" y="8" width="16" height="9" rx="2"/>
          </svg>
        </div>
        <div class="bot-response">
          <div class="err-bubble">Could not reach the server. Make sure FastAPI is running at the configured URL.</div>
        </div>`;
      messagesEl.appendChild(errRow);
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
</body>
</html>
