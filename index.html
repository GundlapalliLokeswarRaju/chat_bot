<script>
// const API_URL = 'https://loudish-meredith-unpunctured.ngrok-free.dev/chat';
const API_URL = 'http://127.0.0.1:8000/chat';

const btn      = document.getElementById("chatbot-button");
const chat     = document.getElementById("chatbot-container");
const closeBtn = document.getElementById("close-btn");
const inputEl  = document.getElementById("chat-input");
const messagesEl = document.getElementById("chat-body");
const sendBtn  = document.getElementById("send-btn");

btn.onclick = () => {
  chat.style.display = "flex";
  document.getElementById("speech-bubble").style.display = "none";
  inputEl.focus();
};
closeBtn.onclick = () => {
  chat.style.display = "none";
  document.getElementById("speech-bubble").style.display = "block";
};
inputEl.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
sendBtn.onclick = sendMessage;

// ── Icon configs (gold/black theme) ──
const SECTION_ICONS = {
  course:    { bg:'rgba(245,197,24,0.15)', stroke:'#b8860b', path:'<path d="M12 2H4a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="12 2 12 8 18 8"/>' },
  training:  { bg:'rgba(26,26,26,0.08)',   stroke:'#1a1a1a', path:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>' },
  trainer:   { bg:'rgba(245,197,24,0.18)', stroke:'#d4a017', path:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>' },
  placement: { bg:'rgba(34,197,94,0.12)',  stroke:'#15803d', path:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>' },
  unique:    { bg:'rgba(245,197,24,0.12)', stroke:'#f5c518', path:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' },
  tools:     { bg:'rgba(26,26,26,0.08)',   stroke:'#444',    path:'<path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>' },
  default:   { bg:'rgba(245,197,24,0.12)', stroke:'#b8860b', path:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>' },
};

function iconFor(title) {
  const t = title.toLowerCase();
  if (t.includes('course') || t.includes('content') || t.includes('module')) return SECTION_ICONS.course;
  if (t.includes('train') && t.includes('approach')) return SECTION_ICONS.training;
  if (t.includes('trainer') || t.includes('expert')) return SECTION_ICONS.trainer;
  if (t.includes('placement') || t.includes('career')) return SECTION_ICONS.placement;
  if (t.includes('unique') || t.includes('feature')) return SECTION_ICONS.unique;
  if (t.includes('tool')) return SECTION_ICONS.tools;
  return SECTION_ICONS.default;
}

function svgIcon(cfg) {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="${cfg.stroke}" stroke-width="1.8" width="13" height="13">${cfg.path}</svg>`;
}

function cleanMd(text) {
  return text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').trim();
}
function stripMd(text) {
  return text.replace(/\*\*([^*]+)\*\*/g, '$1').trim();
}
function splitBullets(body) {
  return body.split(/[•\n]\s*|\.\s+(?=[A-Z])/)
    .map(s => stripMd(s).trim()).filter(s => s.length > 4);
}

function parseSections(rawText) {
  const text = rawText.trim();
  const fmtA = /(\d+)\.\s+\*\*([^*]+)\*\*[:\s\u2014-]*([\s\S]*?)(?=\d+\.\s+\*\*|$)/g;
  const sectionsA = [];
  let m;
  while ((m = fmtA.exec(text)) !== null) {
    const title = m[2].replace(/:$/, '').trim();
    const body  = m[3].trim();
    const bullets = body.split(/\n?\s*[-•]\s+/).filter(b => b.trim().length > 3).map(b => stripMd(b));
    if (bullets.length === 0 && body.length > 3) bullets.push(stripMd(body));
    sectionsA.push({ title, bullets });
  }
  if (sectionsA.length >= 2) return { format: 'sections', sections: sectionsA };

  const fmtB = /(?:\d+\.\s+)?([A-Za-z ]+?)\s*[—\-–:]\s*([\s\S]*?)(?=(?:\d+\.\s+)?[A-Za-z ]+?\s*[—\-–:]|$)/g;
  const sectionsB = [];
  const knownLabels = ['direct answer','details','source hint','summary','answer','explanation','note'];
  while ((m = fmtB.exec(text)) !== null) {
    const label = m[1].trim();
    const body  = m[2].trim();
    if (!label || body.length < 3) continue;
    const isKnown = knownLabels.some(k => label.toLowerCase().includes(k));
    if (isKnown || label.length < 30) {
      const bullets = splitBullets(body);
      sectionsB.push({ title: label, bullets, raw: body });
    }
  }
  const noiseLabels = ['call','whatsapp','phone','contact'];
  const filteredB = sectionsB.filter(s => !noiseLabels.some(n => s.title.toLowerCase().trim() === n));
  if (filteredB.length >= 1) return { format: 'qa', sections: filteredB };
  return { format: 'plain', text };
}

function extractStats(bullets) {
  const statsFound = [];
  const patterns = [
    { re:/(\d+\+?\s*modules?)/i,  label:'Modules' },
    { re:/(\d+\+?\s*topics?)/i,   label:'Topics' },
    { re:/(\d+\+?\s*tools?)/i,    label:'Tools' },
    { re:/(\d+\s*days?)/i,        label:'Days access' },
    { re:/(\d+\+?\s*years?)/i,    label:'Experience' },
  ];
  for (const p of patterns) {
    for (const b of bullets) {
      const m = b.match(p.re);
      if (m && statsFound.length < 3) statsFound.push({ val: m[1].trim(), lbl: p.label });
    }
  }
  return statsFound;
}

function extractTools(bullets) {
  const tools = [];
  const kws = ['SEO','Google Ads','ChatGPT','AI tools','Analytics','Canva','WordPress','Social Media','Content','Design tools'];
  for (const b of bullets)
    for (const kw of kws)
      if (b.toLowerCase().includes(kw.toLowerCase()) && !tools.includes(kw)) tools.push(kw);
  return tools.slice(0, 8);
}

function extractTrainer(bullets) {
  for (const b of bullets) {
    const m = b.match(/([A-Z][a-z]+ [A-Z][a-z]+)[,\s].*?(\d+\+?\s*years?)/i);
    if (m) return { name: m[1], exp: m[2] };
  }
  return null;
}

function buildSectionCard(section) {
  const icon = iconFor(section.title);
  const tl = section.title.toLowerCase();

  if (tl.includes('placement') || tl.includes('career')) {
    const items = section.bullets.map(b => `
      <div class="pl-item">
        <div class="pl-icon" style="background:rgba(34,197,94,0.10);">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2.2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>${b}
      </div>`).join('');
    return `<div class="s-card">
      <div class="s-head">
        <div class="s-icon" style="background:${icon.bg};">${svgIcon(icon)}</div>
        <span class="s-title">${section.title}</span>
        <span class="s-badge badge-green" style="margin-left:auto;">100% support</span>
      </div>
      <div class="placement-list">${items}</div>
    </div>`;
  }

  if (tl.includes('course') || tl.includes('content') || tl.includes('module')) {
    const stats = extractStats(section.bullets);
    const tools = extractTools(section.bullets);
    const statsHtml = stats.length ? `<div class="stats-strip">${stats.map(s=>`<div class="stat-cell"><div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('')}</div>` : '';
    const tagsHtml  = tools.length ? `<div class="tag-cloud">${tools.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : '';
    return `<div class="s-card">
      <div class="s-head">
        <div class="s-icon" style="background:${icon.bg};">${svgIcon(icon)}</div>
        <span class="s-title">${section.title}</span>
        <span class="s-badge badge-gold" style="margin-left:auto;">35+ modules</span>
      </div>${statsHtml}${tagsHtml}
    </div>`;
  }

  if (tl.includes('trainer') || tl.includes('expert')) {
    const trainer = extractTrainer(section.bullets);
    const trainerHtml = trainer
      ? `<div class="trainer-row">
          <div class="trainer-av">${trainer.name.split(' ').map(w=>w[0]).join('')}</div>
          <div class="trainer-info">
            <p>${trainer.name}</p>
            <span>${trainer.exp} experience · SEO, Google Ads, Social Media</span>
          </div>
         </div>`
      : `<div class="s-body">${section.bullets.map(b=>`<div class="feat-row"><span class="feat-dot"></span>${b}</div>`).join('')}</div>`;
    return `<div class="s-card">
      <div class="s-head">
        <div class="s-icon" style="background:${icon.bg};">${svgIcon(icon)}</div>
        <span class="s-title">${section.title}</span>
      </div>${trainerHtml}
    </div>`;
  }

  const bullets = section.bullets.map(b=>`<div class="feat-row"><span class="feat-dot"></span>${b}</div>`).join('');
  return `<div class="s-card">
    <div class="s-head">
      <div class="s-icon" style="background:${icon.bg};">${svgIcon(icon)}</div>
      <span class="s-title">${section.title}</span>
    </div>
    <div class="s-body">${bullets}</div>
  </div>`;
}

function buildContactCard(ci) {
  if (!ci) return '';
  const phones = (ci.phone_numbers || []).join(', ');
  const wa     = ci.whatsapp || '';
  return `<div class="s-card">
    <div class="s-head">
      <div class="s-icon" style="background:rgba(245,197,24,0.15);">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#b8860b" stroke-width="1.8">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.16 6.16l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </div>
      <span class="s-title">Contact us</span>
    </div>
    <div class="contact-card">
      ${phones ? `<div class="contact-row"><strong>Phone:</strong> ${phones}</div>` : ''}
      ${wa     ? `<div class="contact-row"><strong>WhatsApp:</strong> ${wa}</div>`  : ''}
    </div>
  </div>`;
}

function buildQACard(section) {
  const tl = section.title.toLowerCase();

  if (tl.includes('direct answer') || tl.includes('answer')) {
    const bodyText = section.raw || section.bullets.join(' ');
    const lines = bodyText.split(/[•]/).map(s=>stripMd(s).trim()).filter(s=>s.length>3);
    const inner = lines.length > 1
      ? lines.map(l=>`<div class="feat-row"><span class="feat-dot"></span>${l}</div>`).join('')
      : `<div style="font-size:13px;color:#1a1a1a;line-height:1.7;">${cleanMd(bodyText)}</div>`;
    return `<div class="answer-card">
      <div class="answer-head">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#b8860b" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
        </svg>
        <span class="s-title">Answer</span>
        <span class="s-badge badge-gold" style="margin-left:auto;">Direct</span>
      </div>
      <div class="answer-body">${inner}</div>
    </div>`;
  }

  if (tl.includes('detail')) {
    const lines = (section.raw || section.bullets.join('\n')).split(/[-•]/).map(s=>stripMd(s).trim()).filter(s=>s.length>4);
    const inner = lines.map(l=>`<div class="feat-row"><span class="feat-dot"></span>${l}</div>`).join('');
    return `<div class="s-card">
      <div class="s-head">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#b8860b" stroke-width="1.8" style="flex-shrink:0;">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span class="s-title">More details</span>
        <span class="s-badge badge-black" style="margin-left:auto;">Details</span>
      </div>
      <div class="s-body">${inner}</div>
    </div>`;
  }

  if (tl.includes('source')) {
    const src = stripMd(section.raw || section.bullets.join(' '));
    return `<div class="source-hint">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#d4a017" stroke-width="1.8">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span>${src}</span>
    </div>`;
  }

  const inner = section.bullets.map(b=>`<div class="feat-row"><span class="feat-dot"></span>${b}</div>`).join('');
  return `<div class="s-card">
    <div class="s-head">
      <div class="s-icon" style="background:rgba(245,197,24,0.12);">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#b8860b" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      </div>
      <span class="s-title">${section.title}</span>
    </div>
    <div class="s-body">${inner}</div>
  </div>`;
}

function renderBotMessage(data) {
  const parsed = parseSections(data.answer);
  let html = '';

  if (parsed.format === 'plain') {
    html = `<div class="answer-card">
      <div class="answer-body">${cleanMd(parsed.text)}</div>
    </div>`;
  } else if (parsed.format === 'qa') {
    html = parsed.sections.map(buildQACard).join('');
  } else {
    html = `<div class="resp-intro">Here's what I found:</div>`;
    html += parsed.sections.map(buildSectionCard).join('');
  }

  if (data.contact_info) html += buildContactCard(data.contact_info);
  html += `<div class="resp-intro" style="font-size:11px;color:#aaa;margin-top:2px;">Need more info? Ask me anything!</div>`;

  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="av-bot">
      <svg viewBox="0 0 20 20" fill="none" stroke="#1a1a1a" stroke-width="1.6" width="13" height="13">
        <rect x="2" y="8" width="16" height="9" rx="2"/><path d="M10 8V5"/><circle cx="10" cy="3.5" r="1.5"/>
      </svg>
    </div>
    <div class="bot-response">${html}</div>`;
  return row;
}

async function sendMessage() {
  const message = inputEl.value.trim();
  if (!message) return;
  inputEl.value = '';

  const userRow = document.createElement('div');
  userRow.className = 'msg-row user';
  userRow.innerHTML = `<div class="av-user">You</div><div class="user-bubble">${message}</div>`;
  messagesEl.appendChild(userRow);

  const typingRow = document.createElement('div');
  typingRow.className = 'msg-row';
  typingRow.innerHTML = `
    <div class="av-bot">
      <svg viewBox="0 0 20 20" fill="none" stroke="#1a1a1a" stroke-width="1.6" width="13" height="13">
        <rect x="2" y="8" width="16" height="9" rx="2"/><path d="M10 8V5"/><circle cx="10" cy="3.5" r="1.5"/>
      </svg>
    </div>
    <div class="bot-response">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  messagesEl.appendChild(typingRow);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })     // ✅ your backend field
    });
    const data = await response.json();
    typingRow.remove();
    messagesEl.appendChild(renderBotMessage(data));   // ✅ reads data.answer
  } catch (err) {
    typingRow.remove();
    const errRow = document.createElement('div');
    errRow.className = 'msg-row';
    errRow.innerHTML = `
      <div class="av-bot">
        <svg viewBox="0 0 20 20" fill="none" stroke="#1a1a1a" stroke-width="1.6" width="13" height="13">
          <rect x="2" y="8" width="16" height="9" rx="2"/>
        </svg>
      </div>
      <div class="bot-response">
        <div class="err-bubble">Could not reach the server. Please try again.</div>
      </div>`;
    messagesEl.appendChild(errRow);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
